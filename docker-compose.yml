version: '3'
services:
  openvpn:
    container_name: openvpn
    image: smolinec/docker-openvpn
    restart: unless-stopped
    privileged: true
    ports:
    - 1194:1194/udp
    cap_add:
      - NET_ADMIN
    volumes:
    - ./openvpn-data/conf:/etc/openvpn
    environment:
      - OVPN_DEFROUTE=1
